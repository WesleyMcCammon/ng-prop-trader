<header class="site-header">
  <div class="header-inner container">
    <a class="brand" routerLink="/" (click)="closeMenu()">
      <span class="brand-icon">📈</span>
      <span class="brand-name">MarketWatch</span>
    </a>

    <nav class="nav-desktop" aria-label="Main navigation">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
      <a routerLink="/market" routerLinkActive="active">Markets</a>
      <a routerLink="/instruments" routerLinkActive="active">Instruments</a>
      <a routerLink="/indicators" routerLinkActive="active">Indicators</a>
      <a routerLink="/news-alerts" routerLinkActive="active">News Alerts</a>
      @if (isAdmin()) {
        <a routerLink="/settings" routerLinkActive="active">Settings</a>
        <a routerLink="/admin" routerLinkActive="active">Admin</a>
      }
    </nav>

    <div class="nav-auth">
      @if (isLoggedIn()) {
        <span class="nav-user">{{ currentUser()?.name }}</span>
        <button class="btn-logout" (click)="logout()">Log Out</button>
      } @else {
        <a routerLink="/login" class="btn-login">Log In</a>
      }
    </div>

    <button
      class="hamburger"
      [class.open]="menuOpen()"
      (click)="toggleMenu()"
      aria-label="Toggle navigation"
      [attr.aria-expanded]="menuOpen()">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <nav class="nav-mobile" [class.open]="menuOpen()" aria-label="Mobile navigation">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenu()">Home</a>
    <a routerLink="/market" routerLinkActive="active" (click)="closeMenu()">Markets</a>
    <a routerLink="/instruments" routerLinkActive="active" (click)="closeMenu()">Instruments</a>
    <a routerLink="/indicators" routerLinkActive="active" (click)="closeMenu()">Indicators</a>
    <a routerLink="/news-alerts" routerLinkActive="active" (click)="closeMenu()">News Alerts</a>
    @if (isAdmin()) {
      <a routerLink="/settings" routerLinkActive="active" (click)="closeMenu()">Settings</a>
      <a routerLink="/admin" routerLinkActive="active" (click)="closeMenu()">Admin</a>
    }
    @if (isLoggedIn()) {
      <button class="btn-logout" (click)="logout()">Log Out</button>
    } @else {
      <a routerLink="/login" class="btn-login" (click)="closeMenu()">Log In</a>
    }
  </nav>
</header>
