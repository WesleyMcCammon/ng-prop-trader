<main class="market-page">
  <div class="container">

    <div class="page-header">
      <h1 class="page-title">Market Overview</h1>
      <a routerLink="/dashboard" class="btn-back">‹ Back to Dashboard</a>
    </div>

    <!-- Futures -->
    <section class="market-section">
      <div class="section-header">
        <h2 class="section-title">
          <span class="type-badge type-badge--futures">futures</span>
          Futures Contracts
        </h2>
        <span class="count">{{ futures().length }}</span>
      </div>
      <div class="cards-grid">
        @for (i of futures(); track i.symbol) {
          <app-instrument-card [instrument]="i" />
        }
      </div>
    </section>

    <!-- Forex -->
    <section class="market-section">
      <div class="section-header">
        <h2 class="section-title">
          <span class="type-badge type-badge--forex">forex</span>
          Forex
        </h2>
        <span class="count">{{ forex().length }}</span>
      </div>
      <div class="cards-grid">
        @for (i of forex(); track i.symbol) {
          <app-instrument-card [instrument]="i" />
        }
      </div>
    </section>

    <!-- CFDs -->
    <section class="market-section">
      <div class="section-header">
        <h2 class="section-title">
          <span class="type-badge type-badge--cfd">cfd</span>
          CFDs
        </h2>
        <span class="count">{{ cfds().length }}</span>
      </div>
      <div class="cards-grid">
        @for (i of cfds(); track i.symbol) {
          <app-instrument-card [instrument]="i" />
        }
      </div>
    </section>

  </div>
</main>
