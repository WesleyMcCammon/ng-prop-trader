@if (orderedPinned().length > 0) {
  <section class="pinned-section">
    <div class="pinned-header">
      <span class="pinned-title">Pinned</span>
      <span class="pinned-count">{{ orderedPinned().length }}</span>
    </div>
    <div class="pinned-grid" cdkDropList [cdkDropListData]="orderedPinned()" (cdkDropListDropped)="onDrop($event)">
      @for (i of orderedPinned(); track i.symbol) {
        <app-instrument-card [instrument]="i" [showType]="true" [showExpand]="true" [hideAllLevels]="hideAllLevels" [animateUnpin]="true" [attr.data-symbol]="i.symbol" cdkDrag />
      }
    </div>
  </section>
}
